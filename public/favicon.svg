<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Aperture iris: 8 blades, each a skewed wedge.
    Outer arc spans 90° centered at blade angle.
    Inner arc spans 45° offset +45° clockwise from outer center.
    This creates the overlapping, pinwheel look of a real iris diaphragm.

    Blade 0 coordinates (rotate by i×45° for blades 1–7):
      Outer-left  : 13·(sin-45°, -cos-45°) = (-9.19, -9.19)
      Outer-right : 13·(sin+45°, -cos+45°) = ( 9.19, -9.19)
      Inner-far   :  5·(sin 67.5°,-cos 67.5°) = ( 4.62, -1.91)
      Inner-near  :  5·(sin 22.5°,-cos 22.5°) = ( 1.91, -4.62)
  -->
  <defs>
    <clipPath id="oc">
      <circle cx="16" cy="16" r="13.5"/>
    </clipPath>
  </defs>

  <g transform="translate(16,16)" clip-path="url(#oc)">
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(0)"/>
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(45)"/>
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(90)"/>
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(135)"/>
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(180)"/>
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(225)"/>
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(270)"/>
    <path d="M -9.19 -9.19 A 13 13 0 0 1 9.19 -9.19 L 4.62 -1.91 A 5 5 0 0 0 1.91 -4.62 Z" fill="rgba(232,196,106,0.40)" stroke="rgba(15,14,12,0.85)" stroke-width="1" stroke-linejoin="round" paint-order="stroke fill" transform="rotate(315)"/>
  </g>

  <!-- Outer lens ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="rgba(15,14,12,0.85)" stroke-width="1.2"/>
  <!-- Center opening -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="rgba(15,14,12,0.85)" stroke-width="1"/>
</svg>
